<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You </title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Inter',sans-serif;
background:#EAF1FF;
height:100vh;
overflow:hidden;
}

#app{
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
position:absolute;
width:90%;
max-width:420px;
max-height:90vh;
overflow:auto;
background:#fff;
border-radius:26px;
padding:40px 32px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,.15);
opacity:0;
transform:scale(.94) translateY(40px);
transition:.7s cubic-bezier(.19,1,.22,1);
pointer-events:none;
}

.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{background:#6FA8FF;border-radius:10px}

.card.active{
opacity:1;
transform:scale(1) translateY(0);
pointer-events:auto;
}

h1,h2{
font-family:'DM Serif Display',serif;
margin:0 0 14px;
}

p{font-size:15px;line-height:1.7;opacity:.85}

button{
padding:12px 26px;
border:none;
border-radius:999px;
background:#2E5AAC;
color:white;
cursor:pointer;
margin-top:18px;
font-size:15px;
transition:.25s;
}
button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(46,90,172,.4);
}

/* PIN */
.pin-display{
display:flex;
justify-content:center;
gap:12px;
margin:25px 0;
}
.dot{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #2E5AAC;
}
.dot.fill{background:#2E5AAC}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}
.keypad button{
padding:16px;
font-size:18px;
border-radius:14px;
}

/* GAME */
#options{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}
#options button{
background:#2E5AAC;
border:1px solid #0d3277;
}

.score-box{
margin-top:22px;
font-size:15px;
letter-spacing:.5px;
}

#feedback{
margin-top:14px;
min-height:22px;
font-size:14px;
transition:.3s;
}

.correctAnim{
animation:pop .4s ease;
background:#388ca3 !important;
border-color:#8facdb !important;
}
@keyframes pop{
0%{transform:scale(.9)}
60%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.wrongAnim{
animation:shake .4s;
background:#d84343 !important;
border-color:#ff9b9b !important;
}

@keyframes shake{
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-4px)}
}

/* TIMER */
.lovebox{
background:linear-gradient(145deg,#fff,#dbe8ff);
border-radius:22px;
padding:20px;
margin-bottom:25px;
box-shadow:0 12px 35px rgba(46,90,172,.25);
border:1px solid rgba(46,90,172,.25);
}

.timer-title{
font-size:12px;
letter-spacing:2px;
color: #0d3277;
opacity:.6;
}

.timer-display{
font-family:'DM Serif Display',serif;
font-size:25px;
margin-top:8px;
color:#1B3C73;
letter-spacing:1px;
animation:pulse 2.5s infinite;
text-shadow:0 0 12px rgba(111,168,255,.6);
}
@keyframes pulse{50%{opacity:.5}}

/* MEDIA */
.reveal-box{
margin:20px 0;
aspect-ratio:16/9;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
border:2px dashed #2E5AAC;
cursor:pointer;
background:#F4F8FF;
transition:.3s;
}
.reveal-box:hover{transform:scale(1.02)}

/* LETTER FINAL */
.letter{
margin-top:22px;
font-family:'Cormorant Garamond',serif;
font-size:18px;
line-height:1.3;
letter-spacing:.4px;
text-align:left;
color:black;
opacity:.95;
min-height:100px;
animation:fadeInText 1.2s ease;
}

.signature{
margin-top:32px;
text-align:right;
font-family:'Playfair Display',serif;
font-size:20px;
letter-spacing:1px;
color:#1B3C73;
animation:fadeInText 1.8s ease;
}

.card h1 {
color: #0d3277;
font-size: 22px;
}


@keyframes fadeInText{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}


/* HEART BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confettiCanvas"></canvas>

<audio id="bgm" src="song.mp3" loop></audio>

<div id="app">

<!-- welcome -->
<section class="card active">
<h1>I Belongs to You</h1>
<p>I made something special.<br>But you have to unlock it.</p>
<button onclick="next()">Continue</button>
</section>

<!-- pin -->
<section class="card">
<h2>Enter the code 🔐</h2>
<div class="pin-display" id="pin"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>
</section>

<!-- quiz -->
<section class="card">
<h2 id="question">Little game 🎮</h2>
<p>Answer correctly to earn points 🤍</p>
<div id="options"></div>

<div class="score-box">
Points: <span id="score">0</span> / 3
</div>

<p id="feedback"></p>
</section>

<!-- final -->
<section class="card">

<h1>To my love who’s a little far from me right now…</h1>

<div class="lovebox">
<div class="timer-title">TIME WITH YOU</div>
<div id="loveTimer" class="timer-display">loading...</div>
</div>

<div class="reveal-box" onclick="revealMemory(this)">
Tap to reveal our memory
</div>

<div id="letter" class="letter"></div>
<div id="sign" class="signature"></div>

</section>

</div>

<script>
const cards=document.querySelectorAll('.card');
let page=0;
const music=document.getElementById("bgm");
music.volume=0.4;
let musicStarted=false;

function show(){
cards.forEach(c=>c.classList.remove('active'));
cards[page].classList.add('active');
if(page===3)startTimer();
}

function next(){
page++;

if(page===1 && !musicStarted){
music.play();
musicStarted=true;
}

show();
if(page===2)loadQuestion();
}

/* PIN */
let pinInput='';
const correctPin='2426';
const pinDisplay=document.getElementById("pin");

function renderDots(){
pinDisplay.innerHTML='';
for(let i=0;i<4;i++){
const d=document.createElement("div");
d.className="dot"+(i<pinInput.length?" fill":"");
pinDisplay.appendChild(d);
}}
renderDots();

function press(n){if(pinInput.length<4){pinInput+=n;renderDots();}}
function clearPin(){pinInput=pinInput.slice(0,-1);renderDots();}

function checkPin(){
if(pinInput===correctPin)next();
else{
pinDisplay.classList.add('shake');
setTimeout(()=>pinDisplay.classList.remove('shake'),400);
pinInput='';renderDots();
}
}

/* QUIZ */
const questions=[
{q:"kapan kita bertemu?",options:["februari","april","maret"],correct:1},
{q:"kapan kamu mulai jatuh cinta sama aku?",options:["awal bertemu","pas udah pacaran","semuanya benar"],correct:2},
{q:"Siapa aku dikehidupan kamu?",options:["girlfriend","partner for life","all is true"],correct:2}
];

let currentQ=0,score=0;
const scoreEl=document.getElementById("score");
const question=document.getElementById("question");
const options=document.getElementById("options");
const feedback=document.getElementById("feedback");

function loadQuestion(){
const q=questions[currentQ];
question.textContent=q.q;
options.innerHTML="";
feedback.textContent="";
q.options.forEach((opt,i)=>{
const b=document.createElement("button");
b.textContent=opt;
b.onclick=()=>checkAnswer(i,b);
options.appendChild(b);
});
}

function checkAnswer(i,btn){
const q=questions[currentQ];

if(i===q.correct){
score++;
scoreEl.textContent=score;
btn.classList.add("correctAnim");
feedback.textContent="Correct 🤍";

setTimeout(()=>{
currentQ++;
if(currentQ<questions.length){loadQuestion();}
else{next();}
},900);

}else{
btn.classList.add("wrongAnim");
feedback.textContent="Oops nope — try again 💭";
}
}

/* TIMER */
function getDiff(start, timeZone){
  const now = new Date(
    new Date().toLocaleString("en-US",{ timeZone })
  );
  const diff = now - start;

  return {
    d: Math.floor(diff/86400000),
    h: Math.floor(diff/3600000)%24,
    m: Math.floor(diff/60000)%60,
    s: Math.floor(diff/1000)%60
  };
}

function startTimer(){

    const start = new Date("2025-11-06T00:00:00");

    setInterval(()=>{

        const diff = new Date() - start;

        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff / 3600000) % 24;
        const m = Math.floor(diff / 60000) % 60;
        const s = Math.floor(diff / 1000) % 60;

        loveTimer.textContent = `${d} days ${h}h ${m}m ${s}s`;

    },1000);
}

startTimer();

/* REVEAL */
function revealMemory(el){
el.innerHTML=`<img src="p.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:18px">`;

const text=`
I'm already excited for all the next 6ths with you. The ones where we celebrate, the ones where we're just existing together, the ones where I get to be close to you and call you mine like it's the most normal thing in the world. Because with you, it is.

I think what I want sounds simple, but it means everything to me. I want to stay. I want to be yours in all the small, everyday ways. I want to take care of you, to check on you, to be the one you come to without thinking twice. I want to be soft with you, and I want you to be soft with me too.

I want to grow older with you, slowly and happily, side by side. I want more time with you, more memories, more simple days that somehow feel full just because I have you, days that don't feel little at all because I get to spend them with you.

You feel like home to me. Like someone I can hold onto and never get tired of.
With you, I’ve found a kind of peace I didn’t even know I was looking for. It’s a kind of comfort I didn’t know I needed until I found it in you. It’s something I can’t find anywhere else, no matter how hard I try. Every moment with you, no matter how small, feels important and meaningful.

Thank you for being here with me, for every moment, every word, and every feeling we’ve shared. Happy 2nd mensiversary, sayangku. I’m so grateful for you, today and always. ❤️

`;

let i=0;
const letter=document.getElementById("letter");
const sign=document.getElementById("sign");

const type=setInterval(()=>{
letter.innerHTML+=text.charAt(i);
i++;
if(i>=text.length){
clearInterval(type);
sign.innerHTML="Sincerely,<br>Me 🤍";
}
},35);
}

/* HEARTS */
const canvas=document.getElementById("confettiCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

const colors=[
"rgba(27,60,115,0.35)",
"rgba(46,90,172,0.35)",
"rgba(111,168,255,0.35)"
];

let hearts=[];
for(let i=0;i<140;i++){
hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*6+2,
v:Math.random()*0.6+0.2,
c:colors[Math.floor(Math.random()*colors.length)]
});
}

function heart(x,y,s){
ctx.beginPath();
ctx.moveTo(x,y);
ctx.bezierCurveTo(x,y-s,x-s,y-s,x-s,y);
ctx.bezierCurveTo(x-s,y+s,x,y+s*1.4,x,y+s*1.8);
ctx.bezierCurveTo(x,y+s*1.4,x+s,y+s,x+s,y);
ctx.bezierCurveTo(x+s,y-s,x,y-s,x,y);
ctx.fill();
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.shadowColor="rgba(111,168,255,0.6)";
ctx.shadowBlur=12;

hearts.forEach(h=>{
ctx.fillStyle=h.c;
heart(h.x,h.y,h.s);
h.y+=h.v;
if(h.y>canvas.height){
h.y=-90;
h.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
